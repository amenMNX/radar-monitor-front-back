services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: radar-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=radar-monitoring-backend
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:radar_monitoring
      - SPRING_H2_CONSOLE_ENABLED=true
      - JAVA_OPTS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - radar-network

  frontend:
    build:
      context: ./Radar-System-monitoring-main
      dockerfile: Dockerfile
      # FIX: VITE_API_URL must be a BUILD ARG, not a runtime env var.
      # Vite replaces import.meta.env.VITE_* at bundle time; the value is
      # baked into the JS bundle and cannot be changed at container start.
      # The Dockerfile must declare: ARG VITE_API_URL and ENV VITE_API_URL=$VITE_API_URL
      args:
        - VITE_API_URL=http://localhost:8081/api
    container_name: radar-frontend
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - radar-network

networks:
  radar-network:
    driver: bridge

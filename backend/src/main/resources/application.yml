server:
  port: 8081

spring:
  application:
    name: radar-monitoring-backend
  datasource:
    url: jdbc:h2:mem:radar_monitoring
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
